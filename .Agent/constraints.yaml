meta:
  format: yaml/1.0
  last_updated: "2026-03-11"
  note: >
    These constraints are NON-NEGOTIABLE.
    An agent MUST NOT violate any rule without explicit written approval
    from the engineer in the same session.

# ─────────────────────────────────────────────────────────────
# 1. INFORMATION SOURCES
# ─────────────────────────────────────────────────────────────

information_sources:

  primary:
    path: docs/
    description: >
      Official Obsidian API docs and plugin development guides live here.
      Read the relevant docs/ file BEFORE using any Obsidian API.
      Never guess at API signatures.

  secondary:
    path: src/
    description: >
      Existing source files are ground truth for established patterns.
      Read the code before making assumptions.

  banned:
    description: >
      Do NOT fetch external URLs for Obsidian API documentation during a task.
      docs/ is the authoritative source.
      External searches are only permitted for third-party library APIs
      (pdf.js, SheetJS, epub.js, etc.) not covered in docs/.

# ─────────────────────────────────────────────────────────────
# 2. CODE QUALITY
# ─────────────────────────────────────────────────────────────

code_quality:

  language: "TypeScript — strict mode, explicit types on all public APIs"

  no_any: >
    Avoid `any`. Use `unknown` + type guards or proper interfaces.
    If a third-party type is missing, define a minimal local interface.

  no_hardcoded_config: >
    No hardcoded keyboard shortcuts, colours, sizes, or feature flags.
    All user-configurable values MUST come from PluginSettings.
    Add new settings to src/settings.ts and expose them in the settings tab.

  imports:
    obsidian: "Import from 'obsidian' only"
    pdfjs_types: "Import from 'pdfjs-dist/types/src/display/api' (not main)"
    relative: "Verify import depth matches actual file location before committing"

  file_structure:
    "src/main.ts": "Plugin lifecycle only — load, unload, register views and commands"
    "src/settings.ts": "PluginSettings interface, DEFAULT_SETTINGS, settings tab UI"
    "src/types.ts": "VIEW_TYPE_* constants, shared TypeScript types"
    "src/views/": "FileView subclasses — one file per view type"
    "src/views/pdf/": "PDF-specific controllers and types"
    "src/utils/": "Pure utility functions — no Obsidian state, easily testable"
    "styles.css": "All CSS — single file, Obsidian CSS variables only"

  module_size:
    max_lines: 600
    action: "If a view file exceeds 600 lines, extract controllers to src/views/<type>/"

  no_console_log: "Remove all console.log() before committing. Use new Notice() for user messages."

  error_handling: >
    Wrap all async file operations in try/catch.
    Show user-friendly Notice() messages on failure.
    Never let an unhandled rejection crash the plugin.

# ─────────────────────────────────────────────────────────────
# 3. UI / UX
# ─────────────────────────────────────────────────────────────

ui_constraints:

  css_variables_only:
    rule: "ONLY Obsidian CSS variables in styles.css"
    banned:
      - "Hardcoded hex colours (#3a5aef)"
      - "Named colours (color: blue)"
      - "Hardcoded font sizes (font-size: 13px)"
      - "Hardcoded background colours (background: white)"
    allowed:
      - "var(--obsidian-token)"
      - "calc() with variables"
      - "Relative units: em, rem, %"
      - "rgba(0,0,0,N) for shadows only"

  icons:
    api: "setIcon(element, 'lucide-icon-name')"
    tooltips: "setTooltip(element, text) — never element.title = '...'"
    banned: "Emoji characters as button labels"

  native_classes:
    icon_button: ".clickable-icon"
    modal_confirm_button: ".mod-cta"
    modal_button_row: ".modal-button-container"
    modal_title: "this.setTitle('text') — not createEl('h3')"

  no_react: >
    Do NOT add React. Native Obsidian DOM API (createEl, setIcon, setTooltip,
    addAction) achieves the same native feel without ~40kb overhead and
    hydration complexity.

  toolbar_philosophy:
    primary_tools: "Annotation toolbar — tools used constantly"
    secondary_actions: "View header via addAction() — infrequent actions (search, TOC, export)"
    settings_config: "Settings tab only — never in toolbar"

# ─────────────────────────────────────────────────────────────
# 4. PERFORMANCE
# ─────────────────────────────────────────────────────────────

performance:

  bundle_size:
    max: "2MB minified"
    check: "ls -lh main.js after adding any new library"
    action_if_over: "Use dynamic import() so library loads only when that file type is opened"

  lazy_loading:
    rule: "Heavy libraries MUST use dynamic import() — loaded on first file open, not on plugin load"
    pattern: "const lib = await import('heavy-library');"
    applies_to:
      - pptx renderer
      - Three.js / Babylon.js
      - epub.js

  pdf_rendering:
    rule: "Never render all pages on load"
    method: "IntersectionObserver — render only visible pages"
    cleanup: "pdfDoc.destroy() in onUnloadFile() to free WebGL/canvas memory"

  canvas_cleanup:
    - "pdfDoc.destroy() in onUnloadFile()"
    - "Disconnect all IntersectionObservers in onUnloadFile()"
    - "Use registerDomEvent() so Obsidian handles document-level listener cleanup"

  debounce:
    zoom_rerender: 120ms
    search_input: 300ms
    rule: "Any operation that triggers a full re-render MUST be debounced"

# ─────────────────────────────────────────────────────────────
# 5. GIT / VERSIONING
# ─────────────────────────────────────────────────────────────

versioning:

  scheme: "Semantic Versioning MAJOR.MINOR.PATCH"

  rules:
    patch: "Bug fixes, style tweaks, text changes"
    minor: "New features, new file type support, new settings"
    major: "Breaking changes to annotation format or settings schema"

  bump_commands:
    patch: "npm version patch --no-git-tag-version"
    minor: "npm version minor --no-git-tag-version"
    major: "npm version major --no-git-tag-version"

  sync_check: "After bump: verify package.json, manifest.json, versions.json all match"

  commit_format: |
    type(scope): short description (vX.Y.Z)

    - bullet detail
    - bullet detail

    Assisted by GitHub Copilot

  commit_types: [feat, fix, refactor, style, docs, chore, perf]

  no_co_author: "NEVER add 'Co-authored-by:' trailer. Body line: 'Assisted by GitHub Copilot' only."

  never_commit: [main.js, node_modules/, "*.js.map", .DS_Store]

# ─────────────────────────────────────────────────────────────
# 6. PROBLEM APPROACH
# ─────────────────────────────────────────────────────────────

problem_approach:

  before_coding:
    - "Read docs/ for relevant Obsidian APIs"
    - "Read existing code for established patterns"
    - "Check requirements.yaml — is this req already defined?"
    - "Check constraints.yaml — does anything here apply?"
    - "If scope unclear: ask ONE focused question before coding"
    - "Write a brief plan before touching files"

  when_stuck:
    - "Re-read the relevant docs/ file"
    - "Read similar patterns in the existing codebase"
    - "Try the simplest approach first"
    - "Check third-party library bundle size before adding it"
    - "Surface the blocker to the engineer with clear options"

  banned_patterns:
    - "setTimeout() for UI synchronisation — use proper async/await"
    - "Direct DOM manipulation bypassing Obsidian's createEl() in views"
    - "Module-level globals — use class properties for state"
    - "Reading vault files outside of onLoadFile/onUnloadFile lifecycle"
    - "Writing to the vault on every keystroke — debounce or use blur event"

  new_file_type_checklist:
    - "Define VIEW_TYPE_XXX constant in src/types.ts"
    - "Create src/views/XxxView.ts extending FileView"
    - "Register view in src/main.ts onload()"
    - "Add enableXxx boolean to PluginSettings (default: true)"
    - "Add settings toggle in settings tab under 'File Types' section"
    - "Implement canAcceptExtension() with the extension check"
    - "Lazy-import any heavy library inside onLoadFile()"
    - "Handle all cleanup in onUnloadFile()"
    - "Update requirements.yaml status for the relevant FT-XX req"
    - "Update projectplan.md file type table"
    - "Bump minor version"
