# ─────────────────────────────────────────────────────────────
# FUTURE FILE TYPES
# ─────────────────────────────────────────────────────────────

future_file_types:

  - id: FT-01
    title: Spreadsheet viewer for .xlsx and .csv
    status: planned
    priority: 2
    sprint: 6
    library: SheetJS (xlsx)
    approach: "SheetJS → 2D array → HTML table with frozen header, column resize, sort. maxRowsToRender setting (default 2000)."
    toggle_setting: enableXlsx / enableCsv

  - id: FT-02
    title: Presentation viewer for .pptx
    status: planned
    priority: 2
    sprint: 7
    library: pptxgenjs (parse side) or officeparser
    approach: |
      Phase 1: text extraction view (fast, low complexity)
      Phase 2: visual slide rendering with prev/next navigation + thumbnail strip
    toggle_setting: enablePptx

  - id: FT-03
    title: eBook viewer for .epub
    status: planned
    priority: 3
    sprint: 8
    library: epub.js (epubjs)
    approach: "Paginated or scroll view; chapter TOC; font size preference; reading position memory."
    toggle_setting: enableEpub

  - id: FT-04
    title: Media player for .mp4 / .webm / .mp3 / .ogg / .wav
    status: planned
    priority: 3
    sprint: 6
    library: none — native HTML5 video/audio elements
    approach: "Styled HTML5 player; playback speed, loop toggle, volume memory in settings."
    toggle_setting: enableMedia

  - id: FT-05
    title: Code/data file viewer for .json / .yaml / .xml / .toml
    status: planned
    priority: 3
    sprint: 6
    library: highlight.js (already in Obsidian — use internal API if available)
    approach: "Syntax-highlighted read-only view. JSON/XML get collapsible tree option."
    toggle_setting: enableCodeView
    note: "Only add if rendering is meaningfully better than plain text. Check if Obsidian's own CodeMirror handles it."

  - id: FT-06
    title: Archive inspector for .zip
    status: planned
    priority: 4
    sprint: 9
    library: JSZip
    approach: "File tree with size/type/date. Preview individual text files inside."
    toggle_setting: enableZip

  - id: FT-07
    title: 3D model viewer for .glb / .gltf
    status: planned
    priority: 5
    sprint: future
    library: Three.js or Babylon.js (dynamic import — ~500kb)
    approach: "WebGL canvas with orbit controls. Only add if bundle size impact is acceptable."
    toggle_setting: enable3d

  - id: FT-08
    title: Rich text viewer for .odt / .rtf
    status: planned
    priority: 4
    sprint: future
    library: "odt: TBD  |  rtf: rtf.js or rtfparser"
    toggle_setting: enableOdt / enableRtf
